{% extends "base.html" %}
{% block title %}Siparisler{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
{% endblock %}

{% block content %}
<section class="report-head">
  <div>
    <p class="eyebrow">Rapor</p>
    <h1>Siparisler</h1>
  </div>
  <a class="button ghost" href="{{ url_for('dashboard.index') }}">Dashboard</a>
</section>

<section class="kpi-grid">
  <div class="kpi"><span>Toplam</span><strong id="totalOrders">0</strong></div>
  <div class="kpi"><span>Bekleyen</span><strong id="pendingOrders">0</strong></div>
  <div class="kpi"><span>Kismi</span><strong id="partialOrders">0</strong></div>
  <div class="kpi"><span>Tamamlanan</span><strong id="completedOrders">0</strong></div>
</section>

<section class="table-shell">
  <table id="ordersTable" class="display compact" style="width:100%"></table>
</section>

<dialog id="linesDialog" class="dialog wide">
  <div class="dialog-header">
    <div class="dialog-header-content">
      <div class="dialog-header-info">
        <h2 id="linesTitle">Siparis detayi</h2>
      </div>
    </div>
    <button class="dialog-close" id="closeLinesBtn" type="button">✕</button>
  </div>
  <div class="dialog-body">
    <table id="linesTable" class="display compact" style="width:100%"></table>
  </div>
</dialog>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
<script src="{{ url_for('static', filename='js/orders.js') }}"></script>
{% endblock %}
